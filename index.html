<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FeminaMind | Qadın Sağlamlığı</title>
    <style>
        :root { --p: #9b59b6; --s: #ff85a2; --g: #2ecc71; }
        body { font-family: sans-serif; margin: 0; background: #fff5f7; color: #333; }
        header { background: linear-gradient(135deg, var(--p), var(--s)); color: white; padding: 40px 20px; text-align: center; border-radius: 0 0 30px 30px; }
        .container { padding: 20px; max-width: 500px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        button { width: 100%; background: var(--s); color: white; border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        #res, #aiRes { margin-top: 15px; display: none; padding: 15px; border-radius: 10px; background: #f9f9f9; border-left: 5px solid var(--p); }
    </style>
</head>
<body>
    <header><h1>FeminaMind</h1><p>Sənin sağlamlıq rəhbərin</p></header>
    <div class="container">
        <div class="card">
            <h3>Profilini Yaradın</h3>
            <input type="number" id="age" placeholder="Yaş">
            <select id="type">
                <option value="teen">Gənc Qız</option>
                <option value="mom">Yeni Ana</option>
                <option value="pregnant">Hamilə Xanım</option>
            </select>
            <button onclick="calc()">Planımı Hazırla</button>
            <div id="res"></div>
        </div>
        <div class="card" style="border: 2px solid gold;">
            <h3>Sİ Köməkçi (Gece Dəstəyi)</h3>
            <textarea id="aiIn" placeholder="Məs. Gecə çox acmışam, nə edim?"></textarea>
            <button style="background: #2c3e50;" onclick="ask()">Sİ-dən Soruş</button>
            <div id="aiRes"></div>
        </div>
    </div>
    <script>
        function calc() {
            let t = document.getElementById('type').value;
            let r = document.getElementById('res');
            r.style.display = "block";
            if(t == 'mom') r.innerHTML = "🍼 <b>Ana üçün:</b> Südü artıran yulaf və bol su. Körpə ilə 20 dəqiqə yürüş.";
            else if(t == 'teen') r.innerHTML = "🌸 <b>Gənc Qız:</b> Sağlam dəri üçün şəkəri azaldın. Bol tərəvəz və rəqs!";
            else r.innerHTML = "🤰 <b>Hamilə:</b> Az-az, tez-tez qidalanın. Hamilə yoqası tövsiyədir.";
        }
        function ask() {
            let i = document.getElementById('aiIn').value.toLowerCase();
            let a = document.getElementById('aiRes');
            a.style.display = "block"; a.innerHTML = "Sİ düşünür...";
            setTimeout(() => {
                if(i.includes("ac")) a.innerHTML = "💡 <b>Sİ:</b> Bir stəkan ilıq süd və ya 3 ədəd qoz ye. Tox tutacaq!";
                else if(i.includes("şirin")) a.innerHTML = "💡 <b>Sİ:</b> Darçınlı alma dilimləri ye, şirin istəyini kəsəcək.";
                else a.innerHTML = "💡 <b>Sİ:</b> Bol su iç və dərindən nəfəs al. Sən bacaracaqsan!";
            }, 1000);
        }
    </script>
</body>
</html>
