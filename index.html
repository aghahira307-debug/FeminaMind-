<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FeminaMind | Ağıllı Sistem</title>
    <style>
        :root { --p: #8e44ad; --s: #fd79a8; --bg: #fdfafc; --dark: #2d3436; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: var(--dark); line-height: 1.6; }
        
        header { background: linear-gradient(135deg, var(--p), var(--s)); color: white; padding: 35px 20px; text-align: center; border-radius: 0 0 40px 40px; }
        .logo-img { width: 85px; height: 85px; border-radius: 50%; border: 3px solid white; margin-bottom: 8px; object-fit: cover; background: white; }
        .slogan { font-size: 15px; opacity: 0.95; margin-top: 5px; font-weight: 500; }
        .motivation-box { font-style: italic; font-size: 14px; margin-top: 12px; background: rgba(255,255,255,0.25); padding: 8px 18px; border-radius: 25px; display: inline-block; }
        
        .container { padding: 15px; max-width: 600px; margin: auto; }
        .card { background: white; padding: 22px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid #f1f1f1; }
        h3 { color: var(--p); margin-top: 0; border-bottom: 2px solid #f9f0ff; padding-bottom: 8px; font-size: 1.1rem; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        input, select, textarea { width: 100%; padding: 13px; margin: 8px 0; border: 2px solid #eee; border-radius: 15px; font-size: 15px; box-sizing: border-box; outline: none; }
        
        button { width: 100%; background: var(--s); color: white; border: none; padding: 16px; border-radius: 15px; font-weight: bold; font-size: 17px; cursor: pointer; transition: 0.3s; box-shadow: 0 5px 15px rgba(253, 121, 168, 0.3); }
        button:active { transform: scale(0.98); }
        
        .result-box { display: none; background: white; padding: 25px; border-radius: 30px; border-left: 10px solid var(--p); margin-top: 15px; box-shadow: 0 15px 40px rgba(0,0,0,0.1); }
        .plan-section { background: #fef1f8; padding: 15px; border-radius: 15px; margin-bottom: 15px; border-left: 5px solid var(--s); }
        .allergy-alert { background: #fff5f5; border: 2px dashed #e74c3c; color: #c0392b; padding: 12px; border-radius: 15px; margin-bottom: 12px; font-weight: bold; }
        
        #aiOut { display: none; margin-top: 15px; padding: 15px; background: #f4f1ff; border-radius: 15px; border-left: 5px solid var(--p); font-size: 14px; }
    </style>
</head>
<body>

<header>
    <img src="Femina_20260303_032125_0000.png" alt="Logo" class="logo-img" onerror="this.src='https://via.placeholder.com/100?text=Logo'">
    <h1 style="margin:0;">FeminaMind</h1>
    <div class="slogan">Ağıllı qadınlar üçün ağıllı sistem</div>
    <div id="motivation" class="motivation-box">Yüklənir...</div>
</header>

<div class="container">
    <div class="card">
        <h3>🎯 Analiz və Planlama</h3>
        <div class="grid">
            <input type="number" id="age" placeholder="Yaş">
            <input type="number" id="height" placeholder="Boy (sm)">
            <input type="number" id="weight" placeholder="Çəki (kq)">
            <select id="status">
                <option value="young">Gənc Qız</option>
                <option value="teen">Yeniyetmə Qız</option>
                <option value="pregnant">Hamilə</option>
                <option value="mom">Yeni Ana</option>
                <option value="milk">Süd Verən Ana</option>
            </select>
        </div>
        <select id="goal">
            <option value="lose">Sağlam Çəki Vermək</option>
            <option value="gain">Çəki Artırmaq</option>
            <option value="health">Ümumi Sağlamlıq</option>
            <option value="milk_up">Süd Artımı (Laktasiya)</option>
        </select>
        <textarea id="notes" placeholder="Allergiyalar və ya xüsusi qeydlər..."></textarea>
        <button id="mainBtn">Proqramı Hazırla</button>
    </div>

    <div id="res" class="result-box"></div>

    <div class="card" id="aiCard">
        <h3>✨ Sİ Köməkçi</h3>
        <textarea id="aiIn" placeholder="Sualınızı yazın..."></textarea>
        <button style="background: #2d3436;" id="aiBtn">Soruş</button>
        <div id="aiOut"></div>
    </div>
</div>

<script>
    // 1. Motivasiya Cümlələri
    const quotes = [
        "Bu gün özün üçün bir yaxşılıq et! ✨",
        "Sənin gücün iradəndədir. 🌸",
        "Hər kiçik addım böyük nəticəyə aparır. 💪",
        "Sən hər şeyin ən yaxşısına layiqsən! ❤️"
    ];
    document.getElementById('motivation').innerText = quotes[Math.floor(Math.random() * quotes.length)];

    // 2. Proqramı Hazırla Funksiyası
    document.getElementById('mainBtn').onclick = function() {
        const w = document.getElementById('weight').value;
        const n = document.getElementById('notes').value.toLowerCase();
        const g = document.getElementById('goal').value;
        const res = document.getElementById('res');

        if(!w) { alert("Xahiş edirik çəki hissəsini doldurasınız."); return; }

        let html = "<h2 style='text-align:center; color:var(--p);'>✨ Fərdi Sağlamlıq Planınız</h2>";

        if(n.includes("yumurta") || n.includes("allergiya")) {
            html += "<div class='allergy-alert'>⚠️ Qeyd: Allergiyanız nəzərə alındı.</div>";
        }

        html += "<div class='plan-section'><h3>🥗 Günlük Menyu</h3>";
        let bf = n.includes("yumurta") ? "Yulaf sıyığı" : "2 yumurta ağından omlet";
        html += `• <b>Səhər:</b> ${bf}<br>• <b>Nahar:</b> Sağlam zülal + salat.</div>`;

        let water = (w * 0.035).toFixed(1);
        html += `<div style='text-align:center; font-weight:bold; color:var(--p);'>💧 Su Hədəfi: ${water} Litr</div>`;

        res.innerHTML = html;
        res.style.display = "block";
        res.scrollIntoView({ behavior: 'smooth' });
    };

    // 3. Sİ Funksiyası
document.getElementById('aiBtn').onclick = function() {
        const out = document.getElementById('aiOut');
        out.style.display = "block";
        out.innerHTML = "<b>Sİ:</b> Düşünürəm... ✨";
        setTimeout(() => {
            out.innerHTML = "<b>💡 Sİ Məsləhəti:</b> Hər gün 10 dəqiqə meditasiya və bol su ruhuna yaxşı gələcək. 🌸";
        }, 800);
    };
</script>
</body>
</html>
