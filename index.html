<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FeminaMind | Ağıllı Sistem</title>
    <style>
        :root { --p: #8e44ad; --s: #fd79a8; --bg: #fdfafc; --dark: #2d3436; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: var(--dark); line-height: 1.6; }
        header { background: linear-gradient(135deg, var(--p), var(--s)); color: white; padding: 30px 20px; text-align: center; border-radius: 0 0 40px 40px; }
        .logo-img { width: 90px; height: 90px; border-radius: 50%; border: 3px solid white; margin-bottom: 10px; object-fit: cover; background: white; }
        .slogan { font-style: italic; font-size: 14px; opacity: 0.9; margin-top: 5px; font-weight: 300; }
        .container { padding: 15px; max-width: 600px; margin: auto; }
        .card { background: white; padding: 22px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid #f1f1f1; }
        h3 { color: var(--p); margin-top: 0; border-bottom: 2px solid #f9f0ff; padding-bottom: 8px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        input, select, textarea { width: 100%; padding: 13px; margin: 8px 0; border: 2px solid #eee; border-radius: 15px; font-size: 15px; box-sizing: border-box; }
        button { width: 100%; background: var(--s); color: white; border: none; padding: 18px; border-radius: 15px; font-weight: bold; font-size: 17px; cursor: pointer; transition: 0.3s; box-shadow: 0 5px 15px rgba(253, 121, 168, 0.3); }
        button:active { transform: scale(0.98); }
        .result-box { display: none; background: white; padding: 25px; border-radius: 30px; border-top: 10px solid var(--p); margin-top: 15px; box-shadow: 0 15px 40px rgba(0,0,0,0.1); }
        .plan-section { background: #fef1f8; padding: 15px; border-radius: 15px; margin-bottom: 15px; border-left: 5px solid var(--s); }
        .allergy-alert { background: #fff5f5; border: 2px dashed #e74c3c; color: #c0392b; padding: 15px; border-radius: 15px; margin-bottom: 15px; font-weight: bold; }
    </style>
</head>
<body>

<header>

    <h1 style="margin:0;">FeminaMind</h1>
    <div class="slogan">Ağıllı qadınlar üçün ağıllı sistem</div>
</header>

<div class="container">
    <div class="card">

        <div class="grid">

            <input type="number" id="height" placeholder="Boy (sm)">
            <input type="number" id="weight" placeholder="Çəki (kq)">
            <select id="status">
                <option value="young">Gənc Qız</option>
                <option value="teen">Yeniyetmə Qız</option>
                <option value="pregnant">Hamilə</option>
                <option value="mom">Yeni Ana</option>
                <option value="milk">Süd Verən Ana</option>
            </select>
        </div>
        <select id="goal">
            <option value="lose">Sağlam Çəki Vermək</option>
            <option value="gain">Çəki Artırmaq</option>
            <option value="health">Ümumi Sağlamlıq</option>
            <option value="milk_up">Laktasiya (Süd) Artımı</option>
        </select>
        <textarea id="notes" placeholder="Allergiyalar və xüsusi qeydlər (məs: yumurta allergiyası...)"></textarea>
        <button onclick="generateProgram()">Proqramı Hazırla</button>
    </div>

    <div id="res" class="result-box"></div>
</div>
