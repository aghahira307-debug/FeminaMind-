<head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        /* PDF Düyməsi üçün xüsusi stil */
        .pdf-btn {
            background: #27ae60 !important;
            margin-top: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
    </style>
</head>

<script>
    function openPlanPage() {
        const w = document.getElementById('weight').value;
        if(!w) { alert("Lütfən çəkinizi daxil edin."); return; }
        
        let water = (w * 0.035).toFixed(1);
        let html = `
            <div id="printableArea">
                <h2 style="color:#8e44ad; text-align:center;">🌸 FeminaMind Fərdi Proqram</h2>
                <div style="text-align:center; margin-bottom:20px; font-weight:bold;">
                    Su Hədəfi: ${water} Litr | Tarix: ${new Date().toLocaleDateString()}
                </div>
                
                <div style="background:#fdf2f9; padding:20px; border-radius:20px; border-left:8px solid #8e44ad; margin-bottom:15px;">
                    <h3 style="margin-top:0;">🥗 3 Günlük Menyu</h3>
                    <b>Gün 1:</b> Səhər: Omlet. Nahar: Toyuq. Axşam: Qatıq.<br>
                    <b>Gün 2:</b> Səhər: Yulaf. Nahar: Balıq. Axşam: Tərəvəz.<br>
                    <b>Gün 3:</b> Səhər: Pendir/Zeytun. Nahar: Şorba. Axşam: Salat.
                </div>

                <div style="background:#fdf2f9; padding:20px; border-radius:20px; border-left:8px solid #fd79a8; margin-bottom:15px;">
                    <h3 style="margin-top:0;">🏋️ Fitnes Hərəkətləri</h3>
                    • Squat: 3 set x 15<br>
                    • Plank: 30 saniyə<br>
                    • Yürüş: 8,000 addım
                </div>
                
                <p style="font-size:10px; text-align:center; color:gray;">Bu proqram FeminaMind Sİ tərəfindən hazırlanmışdır.</p>
            </div>
            <button class="main-btn pdf-btn" onclick="downloadPDF()">📥 PDF olaraq yüklə</button>
        `;

        document.getElementById('planResult').innerHTML = html;
        document.getElementById('planPage').style.display = "block";
        document.body.style.overflow = "hidden";
    }

    // PDF Yükləmə Funksiyası
    function downloadPDF() {
        const element = document.getElementById('printableArea');
        const opt = {
            margin:       10,
            filename:     'FeminaMind_Proqram.pdf',
            image:        { type: 'jpeg', quality: 0.98 },
            html2canvas:  { scale: 2 },
            jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };

        // Düyməni PDF-də gizlətmək üçün html2pdf işlədirik
        html2pdf().set(opt).from(element).save();
    }
</script>
