<script>
    function openPlanPage() {
        const age = document.getElementById('age').value;
        const height = document.getElementById('height').value;
        const weight = document.getElementById('weight').value;
        const status = document.getElementById('status').value;
        const goal = document.getElementById('goal').value;
        const allergy = document.getElementById('allergy').value || "Yoxdur";
        
        if(!age || !height || !weight || !status) { alert("Lütfən bütün xanaları doldurun."); return; }
        
        let water = (weight * 0.035).toFixed(1);
        let statusText = document.getElementById('status').options[document.getElementById('status').selectedIndex].text;
        
        // 3 Günlük Menyu Məntiqi (Hədəfə görə)
        let menu = {};
        if(goal === "lose") {
            menu = {
                g1: "Səhər: 2 qaynadılmış yumurta, bol göyərti, 30qr pendir. <br>Nahar: 150qr qaynadılmış toyuq sinəsi, böyük boşqab yaşıl salat. <br>Axşam: 1 kassa qatıq, içinə 1 xörək qaşığı kətan toxumu.",
                g2: "Səhər: 3 x.q. yulaf (su ilə), yarım alma, darçın. <br>Nahar: Bişmiş mərci şorbası, 1 dilim tam buğda çörəyi. <br>Axşam: Sobada bişmiş tərəvəzlər (kabak, bibər, brokoli).",
                g3: "Səhər: 1 yumurtadan göyərtili omlet, 5 zeytun. <br>Nahar: 150qr sobada balıq və ya tuna salatı. <br>Axşam: Qaynadılmış qarabaşaq (5 x.q.) və çoban salatı."
            };
        } else if(goal === "gain") {
            menu = {
                g1: "Səhər: 3 yumurtadan qayğanaq, qoz, bal, süd. <br>Nahar: Mal əti ilə plov (və ya makaron), meyvə şirəsi. <br>Axşam: Toyuq qızartması, kartof püresi, ayran.",
                g2: "Səhər: Fıstıq əzməli çörək, kəsmik, banan. <br>Nahar: Bol ətli lobya şorbası, düyü. <br>Axşam: Sobada ətli kartof, süzmə qatıq.",
                g3: "Səhər: Pendirli buterbrodlar, yumurta, xurma. <br>Nahar: Izqara ət, makaron, çoban salatı. <br>Axşam: Mərci plovu, ətli tərəvəz yeməyi."
            };
        } else {
            menu = {
                g1: "Səhər: Yumurta, pendir, pomidor-xiyar, bitki çayı. <br>Nahar: Tərəvəzli ət yeməyi, 1 kassa qatıq. <br>Axşam: Balıq və ya toyuq, bol salat.",
                g2: "Səhər: Kəsmik, meyvə, bir ovuc badam. <br>Nahar: Qarabaşaq və toyuq. <br>Axşam: Göyərti küküsü, qatıq.",
                g3: "Səhər: Omlet, zeytun, meyvə. <br>Nahar: Zeytun yağlı lobya yeməyi, düyü. <br>Axşam: Sobada toyuq və tərəvəz."
            };
        }

        let allergyWarning = allergy.toLowerCase() !== "yoxdur" ? 
            `<div class="warning-box">⚠️ <b>Allergiya:</b> ${allergy} nəzərə alaraq menyunu tənzimləyin!</div>` : "";

        document.getElementById('printableArea').innerHTML = `
            <div style="padding:15px;">
                <h2 style="color:#8e44ad; text-align:center;">🌸 FeminaMind Fərdi Hesabat</h2>
                <div style="text-align:center; font-size:14px; margin-bottom:15px; border-bottom:1px solid #eee; padding-bottom:10px;">
                    <b>Status:</b> ${statusText} | <b>Məqsəd:</b> ${goal === "lose" ? "Arıqlamaq" : goal === "gain" ? "Çəki almaq" : "Sağlamlıq"}<br>
                    <b>Yaş:</b> ${age} | <b>Boy:</b> ${height} sm | <b>Çəki:</b> ${weight} kq<br>
                    <span style="color:#fd79a8; font-weight:bold;">💧 Su: ${water} L</span>
                </div>
                
                ${allergyWarning}

                <div class="plan-box">
                    <h3 style="margin-top:0;">📅 3 Günlük Tam Menyu</h3>
                    <p><b>Gün 1:</b><br> ${menu.g1}</p>
                    <p><b>Gün 2:</b><br> ${menu.g2}</p>
                    <p><b>Gün 3:</b><br> ${menu.g3}</p>
                </div>

                <div class="plan-box" style="border-left-color:#fd79a8;">
                    <h3 style="margin-top:0;">🏋️ Məşq Proqramı</h3>
                    - Gündəlik 30-40 dəqiqə sürətli yürüş.<br>
                    - Statusa görə: 15 Squat, 20 saniyə Plank (3 set).<br>
                    - Gərginlikdən uzaq durmaq üçün axşam meditasiyası.
                </div>
            </div>
        `;
        document.getElementById('planPage').style.display = "block";
    }

    // Digər funksiyalar (downloadPDF, closePlanPage və s.) olduğu kimi qalır
</script>
