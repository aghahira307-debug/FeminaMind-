<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FeminaMind | Sənin Sağlamlıq Rəhbərin</title>
    <style>
        :root { --p: #8e44ad; --s: #fd79a8; --bg: #fdfafc; --dark: #2d3436; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: var(--dark); }
        
        header { background: linear-gradient(135deg, var(--p), var(--s)); color: white; padding: 30px 20px; text-align: center; border-radius: 0 0 40px 40px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .logo-img { width: 100px; height: 100px; border-radius: 50%; border: 3px solid white; margin-bottom: 10px; object-fit: cover; background: white; }
        
        .container { padding: 15px; max-width: 600px; margin: auto; }
        .card { background: white; padding: 22px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid #f1f1f1; }
        h3 { color: var(--p); margin-top: 0; font-size: 1.2rem; border-bottom: 2px solid #f9f0ff; padding-bottom: 8px; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        input, select, textarea { width: 100%; padding: 13px; margin: 8px 0; border: 2px solid #eee; border-radius: 15px; font-size: 15px; box-sizing: border-box; }
        
        button { width: 100%; background: var(--s); color: white; border: none; padding: 16px; border-radius: 15px; font-weight: bold; font-size: 17px; cursor: pointer; transition: 0.3s; box-shadow: 0 5px 15px rgba(253, 121, 168, 0.3); }
        button:hover { transform: scale(1.02); }

        .result-box { display: none; background: white; padding: 20px; border-radius: 25px; border-left: 10px solid var(--p); margin-top: 15px; animation: slideUp 0.4s ease; }
        .plan-section { background: #fdf0ff; padding: 15px; border-radius: 15px; margin-bottom: 12px; border-left: 4px solid var(--s); }
        .allergy-alert { background: #fff5f5; border: 2px dashed #e74c3c; color: #c0392b; padding: 12px; border-radius: 15px; margin-bottom: 12px; font-weight: 600; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .motivation { font-style: italic; font-size: 14px; margin-top: 8px; }
    </style>
</head>
<body>
