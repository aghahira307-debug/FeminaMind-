<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FeminaMind | Professional</title>
    <style>
        :root { --p: #8e44ad; --s: #fd79a8; --bg: #fdfafc; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: #2d3436; }
        header { background: linear-gradient(135deg, var(--p), var(--s)); color: white; padding: 40px 20px; text-align: center; border-radius: 0 0 30px 30px; }
        .container { padding: 15px; max-width: 600px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.06); margin-bottom: 20px; border: 1px solid #f1f1f1; }
        h3 { color: var(--p); margin-top: 0; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #f0f0f0; border-radius: 12px; font-size: 15px; box-sizing: border-box; }
        button { width: 100%; background: var(--s); color: white; border: none; padding: 16px; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { opacity: 0.9; }
        .result-box { display: none; background: white; padding: 20px; border-radius: 20px; border-left: 8px solid var(--p); margin-top: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .plan-block { background: #fef1f6; padding: 15px; border-radius: 12px; margin-bottom: 10px; border-left: 4px solid var(--s); }
        .motivation { font-style: italic; text-align: center; padding: 10px; color: white; font-weight: 500; }
    </style>
</head>
<body>

<header>
    <h1>FeminaMind</h1>
    <div id="quote" class="motivation">Yüklənir...</div>
</header>

<div class="container">
    <div class="card">
        <h3>📊 Məlumatlarını Daxil Et</h3>
        <div class="grid">
            <input type="number" id="age" placeholder="Yaş">
            <input type="number" id="weight" placeholder="Çəki (kq)">
            <input type="number" id="height" placeholder="Boy (sm)">
            <select id="status">
                <option value="teen">Yeniyetmə</option>
                <option value="young">Gənc Qız</option>
                <option value="pregnant">Hamilə</option>
                <option value="mom">Yeni Ana</option>
                <option value="milk">Süd Verən</option>
            </select>
        </div>
        <select id="goal">
            <option value="health">Sağlam Həyat</option>
            <option value="lose">Sağlam Arıqlama</option>
            <option value="gain">Sağlam Çəki Alma</option>
            <option value="milk_up">Süd Artırmaq</option>
        </select>
        <textarea id="notes" placeholder="Xüsusi qeydlər (məs: kolit, təzyiq, şəkər...)"></textarea>
        <button onclick="generate()">Fərdi Proqramı Tərtib Et</button>
    </div>

    <div id="res" class="result-box"></div>

    <div class="card">
        <h3>✨ Sİ Köməkçi (Premium)</h3>
        <p style="font-size: 12px; color: #e74c3c; font-weight: bold;" id="limitText">Sual Limiti: 3/3</p>
        <textarea id="aiIn" placeholder="Məsələn: Gecə şirniyyat istəyirəm, nə edim?"></textarea>
        <button style="background: #2d3436;" onclick="ask()">Sİ-dən Soruş</button>
        <div id="aiOut" style="display:none; margin-top:15px; padding:15px; background:#f9f0ff; border-radius:12px; border-left: 4px solid var(--p);"></div>
    </div>

    <div class="card">
        <h3>🥗 Günlük Reseptlər</h3>
        <p>• <b>Səhər:</b> 2 yumurta, 1 dilim pendir, bol göyərti.</p>
        <p>• <b>Nahar:</b> Buxarda balıq və ya toyuq + qara düyü.</p>
        <p>• <b>Axşam:</b> Mövsüm tərəvəzlərindən hazırlanmış şorba.</p>
    </div>
</div>

<script>
    // Motivasiya bölməsi
    const quotes = [
        "Sən hər şeyin ən yaxşısına layiqsən! ✨",
        "Kiçik addımlar böyük nəticələr doğurur. 🌸",
        "Bədəninə yaxşı bax, o sənin yeganə evindir. 💪",
        "Bu gün özün üçün bir yaxşılıq et. 💧"
    ];
    document.getElementById('quote').innerText = quotes[Math.floor(Math.random() * quotes.length)];

    // Proqram tərtibi
    function generate() {
        const s = document.getElementById('status').value;
        const g = document.getElementById('goal').value;
        const n = document.getElementById('notes').value.toLowerCase();
        const w = document.getElementById('weight').value;
        const r = document.getElementById('res');

        let html = "<h2 style='text-align:center; color:var(--p);'>Sizin Fərdi Planınız</h2>";

        // Qidalanma Planı
        html += "<div class='plan-block'><b>🍎 Qidalanma:</b><br>";
        if(g === 'lose') html += "- Kalorini azaldın, amma zülalı artırın. Axşam yeməyində yüngül salatlara üstünlük verin.<br>";
        else if(g === 'milk_up') html += "- Gündəlik 3 litr su, yulaf və şüyüd mütləqdir. Kəskin pəhriz etməyin.<br>";
        else if(g === 'gain') html += "- Faydalı yağlar (qoz, fındıq, zeytun yağı) və kompleks karbohidratları artırın.<br>";
        else html += "- Mövsümi qidalanın və işlənmiş qidalardan uzaq durun.<br>";
        
        if(n.includes("kolit")) html += "<br>⚠️ <b>Kolit üçün:</b> Çiy tərəvəz və meyvədən qaçın. Hər şeyi bişmiş və ya püre halında yeyin.<br>";
        if(n.includes("təzyiq")) html += "<br>⚠️ <b>Təzyiq üçün:</b> Duzu tamamilə azaldın, kofeinli içkiləri məhdudlaşdırın.<br>";
        html += "</div>";

        // Məşq Planı
        html += "<div class='plan-block'><b>🧘‍♀️ Aktivlik:</b><br>";
        if(s === 'pregnant') html += "- Yüngül yürüş və nəfəs məşqləri. Ağır idman etmək olmaz.";
        else if(s === 'mom' || s === 'milk') html += "- Pelvik bölgə məşqləri və gündə 30 dəqiqə körpə ilə yürüş.";
        else html += "- Həftədə 3 dəfə 40 dəqiqəlik aktiv idman (qaçış, rəqs, fitnes).";
        html += "</div>";

        // Su Hesabı
        let water = (w * 0.035).toFixed(1);
        html += `<div style="text-align:center; font-weight:bold; color:var(--p);">💧 Sizin günlük su tələbatınız: ${water || 2} Litr</div>`;

        r.innerHTML = html;
        r.style.display = "block";
        r.scrollIntoView({ behavior: 'smooth' });
    }

    // Sİ Sual-Cavab
    let limit = 3;
    function ask() {
        const out = document.getElementById('aiOut');
        const input = document.getElementById('aiIn').value.toLowerCase();
        
        if(limit <= 0) {
            alert("Sual limitiniz bitdi. Premium abunəlik tələb olunur!");
            return;
        }

        limit--;
        document.getElementById('limitText').innerText = `Sual Limiti: ${limit}/3`;
        out.style.display = "block";
        out.innerHTML = "Düşünürəm... 🤔";

        setTimeout(() => {
            if(input.includes("şirin") || input.includes("şokolad")) {
                out.innerHTML = "💡 <b>Sİ:</b> Şirin istəyini kəsmək üçün 1 bardaq suya darçın əlavə edib için və ya 2 ədəd xurma yeyin.";
            } else if(input.includes("ac") || input.includes("yemək")) {
                out.innerHTML = "💡 <b>Sİ:</b> Gecə aclığı üçün ən yaxşı seçim 1 fincan kefir və ya bir az ağ pendirdir.";
            } else {
                out.innerHTML = "💡 <b>Sİ:</b> Bu mövzuda mütləq bol su içməyi və stresdən uzaq durmağı tövsiyə edirəm.";
            }
        }, 1200);
    }
</script>

</body>
</html>
