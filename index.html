<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FeminaMind | Ağıllı Sistem</title>
    <style>
        :root { --p: #8e44ad; --s: #fd79a8; --bg: #fdfafc; --dark: #2d3436; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: var(--dark); line-height: 1.6; }
        
        header { background: linear-gradient(135deg, var(--p), var(--s)); color: white; padding: 25px 20px; text-align: center; border-radius: 0 0 40px 40px; }
        .logo-img { width: 85px; height: 85px; border-radius: 50%; border: 3px solid white; margin-bottom: 8px; object-fit: cover; background: white; }
        .slogan { font-size: 15px; opacity: 0.95; margin-top: 5px; font-weight: 500; letter-spacing: 0.5px; }
        .motivation-box { font-style: italic; font-size: 14px; margin-top: 12px; background: rgba(255,255,255,0.25); padding: 8px 18px; border-radius: 25px; display: inline-block; min-width: 200px; }
        
        .container { padding: 15px; max-width: 600px; margin: auto; }
        .card { background: white; padding: 22px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid #f1f1f1; }
        h3 { color: var(--p); margin-top: 0; border-bottom: 2px solid #f9f0ff; padding-bottom: 8px; font-size: 1.1rem; display: flex; align-items: center; gap: 8px; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        input, select, textarea { width: 100%; padding: 13px; margin: 8px 0; border: 2px solid #eee; border-radius: 15px; font-size: 15px; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--s); }
        
        button { width: 100%; background: var(--s); color: white; border: none; padding: 16px; border-radius: 15px; font-weight: bold; font-size: 17px; cursor: pointer; transition: 0.3s; box-shadow: 0 5px 15px rgba(253, 121, 168, 0.3); }
        button:hover { background: #e84393; transform: translateY(-2px); }
        button:active { transform: scale(0.98); }
        
        .result-box { display: none; background: white; padding: 25px; border-radius: 30px; border-left: 10px solid var(--p); margin-top: 15px; box-shadow: 0 15px 40px rgba(0,0,0,0.1); animation: slideUp 0.5s ease; }
        .plan-section { background: #fef1f8; padding: 15px; border-radius: 15px; margin-bottom: 15px; border-left: 5px solid var(--s); }
        .allergy-alert { background: #fff5f5; border: 2px dashed #e74c3c; color: #c0392b; padding: 12px; border-radius: 15px; margin-bottom: 12px; font-weight: bold; }
        
        #aiOut { display: none; margin-top: 15px; padding: 15px; background: #f4f1ff; border-radius: 15px; border-left: 5px solid var(--p); font-size: 14px; line-height: 1.5; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<header>
    <img src="Femina_20260303_032125_0000.png" alt="Logo" class="logo-img" onerror="this.src='https://via.placeholder.com/100?text=FeminaMind'">
    <h1 style="margin:0; font-size: 2rem;">FeminaMind</h1>
    <div class="slogan">Ağıllı qadınlar üçün ağıllı sistem</div>
    <div id="motivation" class="motivation-box">Yüklənir...</div>
</header>

<div class="container">
    <div class="card">
        <h3>🎯 Analiz və Planlama</h3>
        <div class="grid">
            <input type="number" id="age" placeholder="Yaş">
            <input type="number" id="height" placeholder="Boy (sm)">
            <input type="number" id="weight" placeholder="Çəki (kq)">
            <select id="status">
                <option value="young">Gənc Qız</option>
                <option value="teen">Yeniyetmə Qız</option>
                <option value="pregnant">Hamilə</option>
                <option value="mom">Yeni Ana</option>
                <option value="milk">Süd Verən Ana</option>
            </select>
        </div>
        <select id="goal">
            <option value="lose">Sağlam Çəki Vermək</option>
            <option value="gain">Çəki Artırmaq</option>
            <option value="health">Ümumi Sağlamlıq</option>
            <option value="milk_up">Süd Artımı (Laktasiya)</option>
        </select>
        <textarea id="notes" placeholder="Allergiyalar və ya xüsusi qeydlər (məs: yumurta allergiyası...)"></textarea>
        <button onclick="startCalculation()">Proqramı Hazırla</button>
    </div>

    <div id="res" class="result-box"></div>

    <div class="card">
        <h3>✨ Sİ Köməkçi</h3>
        <textarea id="aiIn" placeholder="Sualınızı bura yazın..."></textarea>
        <button style="background: #2d3436;" onclick="askAI()">Soruş</button>
        <div id="aiOut"></div>
    </div>
</div>
